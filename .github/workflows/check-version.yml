name: Daily Tailscale Version Check

permissions:
  contents: read

on:
  #schedule:
  #  - cron: '0 4,8,18,22 * * *'
  workflow_dispatch:
    inputs:
      version_check_method:
        description: 'Version check method to use'
        type: choice
        options:
          - ghcr
          - tag
        default: 'ghcr'
        required: true

env:
  REPO_SMALL: "GuNanOvO/openwrt-tailscale"
  REPO_SMALL_NAME: "openwrt-tailscale"
  REPO_SMALL_OWNER: "GuNanOvO"

jobs:
  version-check:
    name: Check Version Differences
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      selected_version: ${{ steps.compare.outputs.selected_version }}
      check_method: ${{ steps.compare.outputs.check_method }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load check method from .config/check-method
        id: load-method
        run: |
          # 优先使用 workflow_dispatch 输入，其次读取配置文件，最后默认 ghcr
          if [ -n "${{ github.event.inputs.version_check_method }}" ]; then
            method="${{ github.event.inputs.version_check_method }}"
            echo "Using manually provided method: $method"
          elif [ -f .config/check-method ]; then
            method=$(cat .config/check-method | tr -d '[:space:]')
            echo "Using method from .config/check-method: $method"
          else
            method="tag"
            echo "Using default method: $method"
          fi

          # 输出给后续步骤使用
          echo "method=$method" >> $GITHUB_OUTPUT

      - name: Get GHCR stable version
        id: get_ghcr
        if: ${{ steps.load-method.outputs.method == 'ghcr' }}
        uses: actions/github-script@v6
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          script: |
            const token = process.env.GHCR_TOKEN;
            const res = await fetch(
              'https://api.github.com/orgs/tailscale/packages/container/tailscale/versions',
              { headers: { 
                  'Authorization': `Bearer ${token}`,
                  'Accept': 'application/vnd.github.v3+json'
                } 
              }
            );
            const versions = await res.json();

            // 首先查找同时有 stable 和 latest 标签的版本
            let latestStableObj = versions.find(v => {
              const tags = v.metadata.container.tags || [];
              return tags.includes('stable') && tags.includes('latest');
            });

            // 如果找不到，查找有 latest 标签的版本
            if (!latestStableObj) {
              latestStableObj = versions.find(v => {
                const tags = v.metadata.container.tags || [];
                return tags.includes('latest');
              });
            }

            // 如果还是找不到，查找有 stable 标签的版本
            if (!latestStableObj) {
              latestStableObj = versions.find(v => {
                const tags = v.metadata.container.tags || [];
                return tags.includes('stable');
              });
            }

            if (!latestStableObj) throw new Error('No stable or latest version found in GHCR');

            const versionTag = (latestStableObj.metadata.container.tags || [])
              .filter(tag => tag !== 'latest' && tag !== 'stable')[0];

            if (!versionTag) throw new Error('No version tag found');

            console.log('Upstream latest stable version tag:', versionTag);
            core.setOutput('stable_version', versionTag);

      - name: Get latest stable release from GitHub Releases
        id: get_tag_release
        uses: actions/github-script@v6
        with:
          script: |
            const parse = v => v.slice(1).split('.').map(Number);

            const { data: releases } = await github.rest.repos.listReleases({
              owner: 'tailscale',
              repo: 'tailscale',
              per_page: 20
            });

            // Only consider stable releases (not pre-release) with semver tag
            const stableReleases = releases
              .filter(r => !r.prerelease && /^v\d+\.\d+\.\d+$/.test(r.tag_name))
              .sort((a, b) => {
                const [a1, a2, a3] = parse(a.tag_name);
                const [b1, b2, b3] = parse(b.tag_name);
                return b1 - a1 || b2 - a2 || b3 - a3;
              });

            const latest = stableReleases[0]?.tag_name || '';
            core.setOutput('tag', latest);

      - name: Get latest release tag from openwrt-tailscale
        id: get_small
        uses: actions/github-script@v6
        with:
          script: |
            try {
              const { data } = await github.rest.repos.getLatestRelease({
                owner: '${{ env.REPO_SMALL_OWNER }}',
                repo: '${{ env.REPO_SMALL_NAME }}'
              });
              core.setOutput('tag', data?.tag_name || '');
            } catch (error) {
              core.setOutput('tag', '');
            }

      - name: Compare versions
        id: compare
        run: |
          check_method="${{ steps.load-method.outputs.method }}"
          echo "Using version check method: $check_method"
          
          # Read current version from Makefile
          CURRENT_VERSION=$(grep -oP '^PKG_VERSION:=\K.*' package/tailscale/Makefile | tr -d '[:space:]')
          echo "Current Makefile version: v${CURRENT_VERSION}"
          
          if [ "$check_method" = "ghcr" ]; then
            DETECTED_VERSION="${{ steps.get_ghcr.outputs.stable_version }}"
            echo "GHCR Upstream Version: $DETECTED_VERSION"
            echo "Local Version: v${CURRENT_VERSION}"
            
            if [ -z "$DETECTED_VERSION" ]; then
              echo "No version detected from GHCR, skipping"
              echo "should_build=false" >> ${GITHUB_OUTPUT}
            elif [ "v${CURRENT_VERSION}" != "$DETECTED_VERSION" ]; then
              echo "Version mismatch, triggering build"
              echo "should_build=true" >> ${GITHUB_OUTPUT}
              echo "selected_version=$DETECTED_VERSION" >> ${GITHUB_OUTPUT}
              echo "check_method=ghcr" >> ${GITHUB_OUTPUT}
            else
              echo "Version matches (v${CURRENT_VERSION}), no action needed"
              echo "should_build=false" >> ${GITHUB_OUTPUT}
            fi
          else
            DETECTED_VERSION="${{ steps.get_tag_release.outputs.tag }}"
            echo "GitHub Release Version: $DETECTED_VERSION"
            echo "Local Version: v${CURRENT_VERSION}"
            
            if [ -z "$DETECTED_VERSION" ]; then
              echo "No version detected from GitHub Releases, skipping"
              echo "should_build=false" >> ${GITHUB_OUTPUT}
            elif [ "v${CURRENT_VERSION}" != "$DETECTED_VERSION" ]; then
              echo "Version mismatch, triggering build"
              echo "should_build=true" >> ${GITHUB_OUTPUT}
              echo "selected_version=$DETECTED_VERSION" >> ${GITHUB_OUTPUT}
              echo "check_method=tag" >> ${GITHUB_OUTPUT}
            else
              echo "Version matches (v${CURRENT_VERSION}), no action needed"
              echo "should_build=false" >> ${GITHUB_OUTPUT}
            fi
          fi


  trigger-build:
    name: Trigger Build Workflow with Commit
    permissions:
      contents: write
    needs: version-check
    if: needs.version-check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      ghcr_commit: ${{ steps.get_commit.outputs.commit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit based on selected method
        id: get_commit
        run: |
          check_method="${{ needs.version-check.outputs.check_method }}"
          version="${{ needs.version-check.outputs.selected_version }}"
          echo "Using method: $check_method with version: $version"
          
          if [ "$check_method" = "ghcr" ]; then
            echo "Getting commit from GHCR version ${version}"
            docker pull ghcr.io/tailscale/tailscale:${version}
            commit=$(docker run --rm ghcr.io/tailscale/tailscale:${version} tailscale version | grep -oP 'tailscale commit: \K\w+')
            if [ -n "$commit" ]; then
              echo "Commit from GHCR: $commit"
              echo "commit=$commit" >> $GITHUB_OUTPUT
              echo "version=$version" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            echo "Getting commit from tag release $version"
            git ls-remote https://github.com/tailscale/tailscale.git refs/tags/${version} | cut -f1 > tag_commit.txt
            commit=$(cat tag_commit.txt)
            if [ -n "$commit" ]; then
              echo "Commit from tag: $commit"
              echo "commit=$commit" >> $GITHUB_OUTPUT
              echo "version=$version" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          
          echo "Failed to get commit using $check_method method"
          exit 1
          
      - name: Update Makefile with new version and hash
        id: update_makefile
        run: |
          RAW_VER="${{ steps.get_commit.outputs.version }}"
          NEW_VER=$(echo "$RAW_VER" | sed 's/^v//')
          NEW_COMMIT="${{ steps.get_commit.outputs.commit }}"
          
          SOURCE_URL="https://codeload.github.com/tailscale/tailscale/tar.gz/v${NEW_VER}?"
          echo "Downloading from $SOURCE_URL to calculate hash..."
          NEW_HASH=$(curl -L "$SOURCE_URL" | sha256sum | awk '{print $1}')
          echo "New Hash: $NEW_HASH"

          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$NEW_VER/" package/tailscale/Makefile
          sed -i "s/^PKG_HASH:=.*/PKG_HASH:=$NEW_HASH/" package/tailscale/Makefile
          sed -i "s/PKG_COMMIT:=.*/PKG_COMMIT:=$NEW_COMMIT/" package/tailscale/Makefile

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add package/tailscale/Makefile
          git commit -m "chore: update tailscale to ${{ steps.get_commit.outputs.version}} (${{ steps.get_commit.outputs.commit }})" || true
          git push origin main

      - name: Trigger build workflow
        uses: peter-evans/repository-dispatch@v4
        with:
          event-type: build-tailscale
          token: ${{ secrets.PAT_TOKEN }}
